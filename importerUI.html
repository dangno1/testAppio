<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appio Reviews Importer</title>
    <link rel="stylesheet" href="https://unpkg.com/@shopify/polaris@13.0.0/build/esm/styles.css">
    <style>
        body {
            background-color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        }

        .modal-container {
            display: flex;
            flex-direction: column;
            height: 480px;
            width: 530px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #e1e3e5;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: #202223;
        }

        .close-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            color: #5c5f62;
            display: flex;
            align-items: center;
        }

        .close-btn:hover {
            background-color: #f6f6f7;
        }

        .modal-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: #202223;
            margin-bottom: 8px;
        }

        .shop-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            border: 1px solid #e1e3e5;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 24px;
        }

        .shop-pill {
            background-color: #e3f9eb;
            color: #007f5f;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .search-container {
            position: relative;
            margin-bottom: 8px;
        }

        .search-input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            border: 1px solid #babfc3;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }

        .search-input:focus {
            border-color: #008060;
            box-shadow: 0 0 0 1px #008060;
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #5c5f62;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid #e1e3e5;
            display: flex;
            justify-content: flex-end;
        }

        .start-btn {
            background-color: #ebebeb;
            color: #919191;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: not-allowed;
        }

        .start-btn.active {
            background-color: #008060;
            color: white;
            cursor: pointer;
        }

        .change-shop-btn {
            background: none;
            border: 1px solid #babfc3;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .change-shop-btn:hover {
            background-color: #f6f6f7;
        }
    </style>
</head>

<body>
    <div class="modal-container">
        <div class="modal-header">
            <span class="header-title">Prepare to collect reviews</span>
            <button class="close-btn" aria-label="Close modal">
                <svg viewBox="0 0 20 20" width="20" fill="currentColor">
                    <path
                        d="M13.97 15.03a.75.75 0 1 0 1.06-1.06L11.06 10l3.97-3.97a.75.75 0 0 0-1.06-1.06L10 8.94 6.03 4.97a.75.75 0 0 0-1.06 1.06L8.94 10l-3.97 3.97a.75.75 0 1 0 1.06 1.06L10 11.06l3.97 3.97z">
                    </path>
                </svg>
            </button>
        </div>

        <div class="modal-body">
            <div class="section-label">Shop</div>
            <div class="shop-row">
                <span class="shop-pill">test-test-appio.myshopify.com</span>
                <button class="change-shop-btn">Change shop</button>
            </div>

            <div class="section-label">Select product</div>
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 20 20" width="18" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M12.323 13.383a5.5 5.5 0 1 1 1.06-1.06l4.39 4.39a.75.75 0 1 1-1.06 1.06l-4.39-4.39zm-1.823-1.883a4 4 0 1 0 0-8 4 4 0 0 0 0 8z">
                    </path>
                </svg>
                <input type="text" class="search-input" placeholder="Search product">
            </div>
        </div>

        <div class="modal-footer">
            <button class="start-btn">Start</button>
        </div>
    </div>

    <script>
        // Close modal logic
        document.querySelector('.close-btn').addEventListener('click', () => {
            window.parent.postMessage({ type: 'MODAL/CLOSE' }, '*');
        });

        // Search input logic to enable Start button
        const searchInput = document.querySelector('.search-input');
        const startBtn = document.querySelector('.start-btn');
        searchInput.addEventListener('input', (e) => {
            if (e.target.value.trim().length > 0) {
                startBtn.classList.add('active');
            } else {
                startBtn.classList.remove('active');
            }
        });
    </script>
</body>

</html>
